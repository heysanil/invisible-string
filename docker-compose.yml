# ─────────────────────────────────────────────────────────────────────────────
# LOCAL DEV / CI ONLY — NOT A PRODUCTION TOPOLOGY.
#
# Every credential in this file (Postgres dev/dev, Garage GK… throwaway key,
# Dex client secret + static user in infra/dex-config.yaml) is a hardcoded,
# public, throwaway DEV credential bound to localhost. Do NOT lift this file
# into any shared, staging, or production environment. The documented
# production topology (docs/PLAN.md) is defined separately and must source
# ALL secrets from environment/secret managers — never from this file.
# ─────────────────────────────────────────────────────────────────────────────
name: invisible-string

services:
  postgres:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Creates the "product" (control plane) and "world" (eve durability) DBs.
      - ./infra/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d dev"]
      interval: 5s
      timeout: 3s
      retries: 12

  garage:
    image: dxflrs/garage:v2.3.0
    # --single-node auto-initializes the cluster layout; the --default-access-key
    # + --default-bucket flags idempotently create (on every boot) the access key
    # and "artifacts" bucket from the GARAGE_DEFAULT_* env vars below (Garage ≥
    # v2.3). No separate bucket-init one-shot container needed.
    command: ["/garage", "server", "--single-node", "--default-access-key", "--default-bucket"]
    ports:
      - "${GARAGE_PORT:-3900}:3900"
    environment:
      GARAGE_RPC_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      GARAGE_DEFAULT_ACCESS_KEY: GKdeadbeefdeadbeefdeadbeefdeadbeef
      GARAGE_DEFAULT_SECRET_KEY: cafebabecafebabecafebabecafebabecafebabecafebabecafebabecafebabe
      GARAGE_DEFAULT_BUCKET: artifacts
    volumes:
      - ./infra/garage.toml:/etc/garage.toml:ro
      - garage-data:/var/lib/garage
    healthcheck:
      test: ["CMD", "/garage", "json-api", "GetClusterHealth"]
      interval: 5s
      timeout: 3s
      retries: 12

  dex:
    image: dexidp/dex:v2.45.1
    ports:
      - "${DEX_PORT:-5556}:5556"
    volumes:
      - ./infra/dex-config.yaml:/etc/dex/config.docker.yaml:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://localhost:5556/dex/.well-known/openid-configuration",
        ]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  postgres-data:
  garage-data:
