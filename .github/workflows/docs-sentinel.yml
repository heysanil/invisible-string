name: Docs Sentinel

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  push:
    branches: [main]

# A called workflow can only DOWNGRADE these — the caller must grant them.
permissions:
  contents: write
  pull-requests: write

jobs:
  docs-sentinel:
    uses: slingshot/docs-sentinel/.github/workflows/audit.yml@v1
    secrets:
      MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
      SYNC_PR_TOKEN: ${{ secrets.SYNC_PR_TOKEN }}
    with:
      # Mirrors the living-docs table in AGENTS.md: root contract + README,
      # top-level docs/*.md (NOT docs/superpowers/** — dated historical specs),
      # package/app READMEs, the compiler isolation doc, the site's MDX product
      # docs, and .env.example (the canonical env-var inventory per AGENTS.md).
      allowlist-regex: '^(README\.md|AGENTS\.md|\.env\.example|docs/[^/]+\.md|docs/screenshots/README\.md|packages/compiler/(README|WORLD-ISOLATION)\.md|packages/design-tokens/README\.md|e2e/README\.md|apps/site/README\.md|apps/site/src/content/docs/.*\.mdx)$'
      # Default CHANGELOG rule + this repo's locked historical docs: the build
      # brief, dated specs/plans, the append-only spike report and its fixtures,
      # and the CLAUDE.md symlink (AGENTS.md is the real file).
      denylist-regex: '(^|/)CHANGELOG\.md$|^INITIAL-SPEC\.md$|^docs/superpowers/.*|^spike/.*|^packages/compiler/fixtures/.*|^CLAUDE\.md$'
