# Garage (S3-compatible object store) — single-node config for the DEV compose
# stack. The prod compose embeds its own inline copy (docker-compose.prod.yml
# `configs.garage-toml`) so it deploys without a repo checkout — keep the two
# in sync. The RPC secret comes from the environment (GARAGE_RPC_SECRET):
# a hardcoded throwaway in docker-compose.yml for dev.
metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"

[s3_api]
# Must match the platform's S3_REGION (SigV4 embeds the region).
s3_region = "us-east-1"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.localhost"

[admin]
api_bind_addr = "[::]:3903"
