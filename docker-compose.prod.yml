# ─────────────────────────────────────────────────────────────────────────────
# PRODUCTION single-host topology.
# Design: docs/superpowers/specs/2026-07-07-prod-compose-design.md
# Operate it via docs/DEPLOY.md.
#
# Every secret comes from the deploy environment (${VAR:?} fails fast — see
# .env.prod.example for the full list + generation commands). No host ports
# are published: ingress is the hoster's proxy (e.g. Dokploy's Traefik) on
# the external `dokploy-network`, attached to `web` only.
#
# Worker ↔ control-plane traffic rides the private `internal` bridge, which
# is why ALLOW_INSECURE_WORKER_TRANSPORT=1 is safe HERE and nowhere routable
# (compensated by worker-token auth + a pinned worker-id allowlist).
# ─────────────────────────────────────────────────────────────────────────────
name: invisible-string-prod

services:
  web:
    image: ghcr.io/heysanil/invisible-string-web:${IMAGE_TAG:?}
    restart: unless-stopped
    depends_on:
      control-plane:
        condition: service_healthy
    networks: [internal, dokploy-network]
    healthcheck:
      # 127.0.0.1 (not localhost): busybox resolves localhost to ::1 first, but
      # the gateway's `listen 80` binds IPv4 only — ::1 would connection-refuse.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 6

  control-plane:
    image: ghcr.io/heysanil/invisible-string-control-plane:${IMAGE_TAG:?}
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      garage:
        condition: service_healthy
    environment:
      PORT: "3000"
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD:?}@postgres:5432/product
      WORLD_DATABASE_URL: postgres://app:${POSTGRES_PASSWORD:?}@postgres:5432/world
      S3_ENDPOINT: http://garage:3900
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?}
      S3_BUCKET: artifacts
      S3_REGION: us-east-1
      BETTER_AUTH_URL: https://${APP_DOMAIN:?}
      PUBLIC_APP_URL: https://${APP_DOMAIN:?}
      CORS_ORIGIN: https://${APP_DOMAIN:?}
      TRUSTED_ORIGINS: https://${APP_DOMAIN:?}
      SECURITY_HSTS: "1"
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:?}
      PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET:?}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?}
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET:?}
      WORKER_AUTH_MODE: worker-token
      WORKER_ALLOWED_IDS: ${WORKER_ID:?}
      ALLOW_INSECURE_WORKER_TRANSPORT: "1"
      AGENT_BUILD_ROOT: /var/lib/agents
      NPM_CACHE_DIR: /var/lib/npm-cache
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Platform Slack app (optional — docs/SLACK.md). All three or none:
      # absent, the Slack endpoints answer 503 integration_not_configured.
      SLACK_CLIENT_ID: ${SLACK_CLIENT_ID:-}
      SLACK_CLIENT_SECRET: ${SLACK_CLIENT_SECRET:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
    volumes:
      - agent-build:/var/lib/agents
      - npm-cache:/var/lib/npm-cache
    networks: [internal]
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:3000/api/health'); if (!r.ok) process.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 12

  migrate:
    image: ghcr.io/heysanil/invisible-string-control-plane:${IMAGE_TAG:?}
    command: ["bun", "apps/control-plane/src/migrate.ts"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # The migrator also creates missing databases (first boot on a volume
      # whose image-level init never ran; restores) before applying migrations.
      DATABASE_URL: postgres://app:${POSTGRES_PASSWORD:?}@postgres:5432/product
      WORLD_DATABASE_URL: postgres://app:${POSTGRES_PASSWORD:?}@postgres:5432/world
    networks: [internal]

  worker:
    image: ghcr.io/heysanil/invisible-string-worker:${IMAGE_TAG:?}
    restart: unless-stopped
    depends_on:
      control-plane:
        condition: service_healthy
    environment:
      PORT: "4000"
      WORKER_ID: ${WORKER_ID:?}
      CONTROL_PLANE_URL: http://control-plane:3000
      PUBLIC_URL: http://worker:4000
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET:?}
      WORKER_AUTH_MODE: worker-token
      ARTIFACT_CACHE_DIR: /var/lib/agents
      SANDBOX_REAPER_ENABLED: "1"
    volumes:
      - agent-cache:/var/lib/agents
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [internal]
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:4000/healthz'); if (!r.ok) process.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    configs:
      # Creates the "product" and "world" databases on first boot (mirrors the
      # dev stack's infra/postgres-init.sh; inline so no host file is needed).
      - source: postgres-init
        target: /docker-entrypoint-initdb.d/postgres-init.sh
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 3s
      retries: 12

  garage:
    image: dxflrs/garage:v2.3.0
    restart: unless-stopped
    # --single-node auto-initializes the cluster layout; --default-access-key +
    # --default-bucket idempotently create (on every boot) the access key and
    # "artifacts" bucket from the GARAGE_DEFAULT_* env below (Garage ≥ v2.3).
    # These flags are load-bearing: without them GARAGE_DEFAULT_* is ignored and
    # the store 403s "No such key". Same command as the dev compose garage.
    command: ["/garage", "server", "--single-node", "--default-access-key", "--default-bucket"]
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:?}
      GARAGE_DEFAULT_ACCESS_KEY: ${S3_ACCESS_KEY_ID:?}
      GARAGE_DEFAULT_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:?}
      GARAGE_DEFAULT_BUCKET: artifacts
    volumes:
      - garage-data:/var/lib/garage
    configs:
      - source: garage-toml
        target: /etc/garage.toml
    networks: [internal]
    healthcheck:
      test: ["CMD", "/garage", "json-api", "GetClusterHealth"]
      interval: 5s
      timeout: 3s
      retries: 12

  # Optional Cloudflare Tunnel ingress: docker compose --profile cloudflared up.
  # Map the tunnel's public hostname to http://web:80 in the Cloudflare
  # dashboard. TUNNEL_TOKEN is required only when the profile is enabled
  # (cloudflared exits without it) — `:-` keeps profile-off deploys from
  # demanding the variable.
  cloudflared:
    image: cloudflare/cloudflared:2026.6.0
    profiles: ["cloudflared"]
    restart: unless-stopped
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN:-}
    depends_on: [web]
    networks: [internal]

# Inline file payloads (Compose ≥ 2.23.1 `content:`) — the prod compose stays
# fully standalone, deployable without a repo checkout on the host (e.g. pasted
# into Dokploy). A bind mount of a missing host path would silently become an
# empty DIRECTORY at the target ("Is a directory (os error 21)" crash loops).
configs:
  # Keep in sync with infra/garage.toml (the dev compose's copy of this file).
  garage-toml:
    content: |
      metadata_dir = "/var/lib/garage/meta"
      data_dir = "/var/lib/garage/data"
      db_engine = "sqlite"

      replication_factor = 1

      rpc_bind_addr = "[::]:3901"
      rpc_public_addr = "127.0.0.1:3901"

      [s3_api]
      s3_region = "us-east-1"
      api_bind_addr = "[::]:3900"
      root_domain = ".s3.garage.localhost"

      [admin]
      api_bind_addr = "[::]:3903"
  # $$ escapes compose interpolation → literal $ in the script.
  postgres-init:
    content: |
      #!/bin/sh
      set -e
      psql -v ON_ERROR_STOP=1 --username "$$POSTGRES_USER" --dbname "$$POSTGRES_USER" \
        -c 'CREATE DATABASE product;' -c 'CREATE DATABASE world;'

networks:
  internal: {}
  dokploy-network:
    external: true

volumes:
  postgres-data:
  garage-data:
  agent-build:
  agent-cache:
  npm-cache:
