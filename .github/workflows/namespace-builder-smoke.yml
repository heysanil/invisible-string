# TEMPORARY — verifies docker/build-push-action works against Namespace's
# pre-configured remote builders (the path release.yml uses, which only fires
# on tags). Delete once green; do not merge to main.
name: namespace-builder-smoke

on:
  pull_request:

jobs:
  smoke:
    runs-on: nscloud-ubuntu-24.04-amd64-4x8
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: false
          tags: namespace-builder-smoke:pr
