name: Site

on:
  push:
    branches: [main]
    paths:
      - apps/site/**
      - packages/design-tokens/**
      - .github/workflows/site.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build + deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      # base_path is "/<repo>" for project pages, "" once a custom domain is
      # configured in Settings -> Pages (configure-pages flips it automatically
      # — no workflow edit needed either way).
      - name: Build site
        env:
          SITE_BASE: ${{ steps.pages.outputs.base_path }}
          VITE_SITE_URL: ${{ steps.pages.outputs.base_url }}
        run: bun run --cwd apps/site build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
