name: invisible-string

services:
  postgres:
    image: postgres:16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Creates the "product" (control plane) and "world" (eve durability) DBs.
      - ./infra/postgres-init.sh:/docker-entrypoint-initdb.d/postgres-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d dev"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: dev
      MINIO_ROOT_PASSWORD: devdevdev
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 12

  # One-shot init job: creates the "artifacts" bucket (build tarballs +
  # trigger file payloads). Runs on `docker compose up -d` / `up -d minio-init`.
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - mc alias set local http://minio:9000 dev devdevdev && mc mb --ignore-existing local/artifacts
    restart: "no"

  dex:
    image: dexidp/dex:v2.45.1
    ports:
      - "${DEX_PORT:-5556}:5556"
    volumes:
      - ./infra/dex-config.yaml:/etc/dex/config.docker.yaml:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://localhost:5556/dex/.well-known/openid-configuration",
        ]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  postgres-data:
  minio-data:
