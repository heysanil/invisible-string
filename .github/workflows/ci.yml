name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Typecheck + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # Unit tests only for now. DB-gated tests skip when TEST_DATABASE_URL
      # is unset; the compose integration job (Phase 0 task 4+) provides it.
      - name: Test
        run: bun test
