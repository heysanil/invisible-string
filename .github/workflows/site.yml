name: Site

on:
  push:
    branches: [main]
    paths:
      - apps/site/**
      - packages/design-tokens/**
      - .github/workflows/site.yml
  pull_request:
    paths:
      - apps/site/**
      - packages/design-tokens/**
      - .github/workflows/site.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  VITE_SITE_URL: https://invisiblestring.io

jobs:
  deploy:
    name: Build + deploy to Cloudflare Workers
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run --cwd apps/site build

      # npx (not cloudflare/wrangler-action): the action falls back to
      # `npm i wrangler` inside workingDirectory, and npm can't parse the
      # Bun `workspace:*` protocol in apps/site/package.json. npx installs
      # into its own cache and never touches the project manifest.
      - name: Deploy to Cloudflare Workers
        working-directory: apps/site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: "false"
        run: npx -y wrangler@4.110.0 deploy

  preview:
    name: Build + upload preview version
    # Fork PRs can't read repo secrets — skip rather than fail red.
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        run: bun run --cwd apps/site build

      # Alias rules: lowercase alphanumerics/dashes, starts with a letter,
      # alias + "-invisible-string-site" must fit a 63-char DNS label → 41.
      - name: Compute preview alias
        id: alias
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          alias=$(printf '%s' "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -e 's/[^a-z0-9]\{1,\}/-/g' -e 's/^[^a-z]*//' \
            | cut -c1-41 \
            | sed -e 's/-*$//')
          if [ -z "$alias" ]; then alias="pr-${{ github.event.number }}"; fi
          echo "alias=$alias" >> "$GITHUB_OUTPUT"

      # Same npx-over-action rationale as the deploy job above.
      - name: Upload preview version
        working-directory: apps/site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_SEND_METRICS: "false"
          ALIAS: ${{ steps.alias.outputs.alias }}
        run: |
          npx -y wrangler@4.110.0 versions upload \
            --preview-alias "$ALIAS" 2>&1 \
            | tee "$RUNNER_TEMP/wrangler-upload.txt"

      - name: Comment preview URLs on the PR
        env:
          GH_TOKEN: ${{ github.token }}
          ALIAS: ${{ steps.alias.outputs.alias }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          urls=$(grep -Eo 'https://[a-z0-9-]+-invisible-string-site[a-z0-9.-]*\.workers\.dev' \
            "$RUNNER_TEMP/wrangler-upload.txt" | sort -u)
          if [ -z "$urls" ]; then
            echo "::warning::no preview URLs found in wrangler output"
            exit 0
          fi
          {
            echo "### Site preview"
            echo ""
            printf '%s\n' "$urls" | sed 's/^/- /'
            echo ""
            echo "_Commit $HEAD_SHA · alias \`$ALIAS\`_"
          } > comment.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --edit-last --create-if-none --body-file comment.md
