name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Typecheck + unit tests
    runs-on: nscloud-ubuntu-24.04-amd64-4x8
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # DB-gated tests skip when TEST_DATABASE_URL is unset; the integration
      # and acceptance jobs below provide it.
      - name: Test
        run: bun test

      # Production build of the SPA — tsc project build + Vite bundle. Catches
      # bundler-only breakage (module resolution, code-split chunks) the
      # typecheck/test lanes don't exercise.
      - name: Web build
        run: bun run --cwd apps/web build

  integration:
    name: Gated integration tests (compose)
    runs-on:
      - nscloud-ubuntu-24.04-amd64-8x16-with-cache
      - nscloud-cache-tag-eve-npm
      - nscloud-cache-size-20gb
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - uses: jdx/mise-action@v2
        with:
          install_args: node@24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Mount Namespace cache volume (eve npm installs)
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          path: ~/.npm

      - name: Compose up (postgres, garage, dex)
        run: docker compose up -d --wait postgres garage dex

      # The world-isolation proof and the spike suites need the spike
      # project's pinned @workflow/world-postgres install.
      - name: Install spike agent project (mise node 24)
        run: mise exec node@24 -- npm ci
        working-directory: spike/agent-project

      - name: Gated tests (apps + packages + spike)
        env:
          TEST_DATABASE_URL: postgres://dev:dev@localhost:5432/product
          TEST_S3_ENDPOINT: http://localhost:3900
        run: bun test apps packages spike

      - name: Compose down
        if: always()
        run: docker compose down -v

  acceptance:
    # Full compiler→build→run spine: real compile, mise-node24 npm install,
    # eve build, tarball → Garage, real worker + agent, mock-model turns.
    # Slow on a cold npm cache — generous timeout.
    name: Phase-1 acceptance (eve build)
    runs-on:
      - nscloud-ubuntu-24.04-amd64-8x16-with-cache
      - nscloud-cache-tag-eve-npm
      - nscloud-cache-size-20gb
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - uses: jdx/mise-action@v2
        with:
          install_args: node@24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Mount Namespace cache volume (eve npm installs)
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          path: ~/.npm

      - name: Compose up (postgres, garage, dex)
        run: docker compose up -d --wait postgres garage dex

      - name: Phase-1 acceptance
        env:
          TEST_DATABASE_URL: postgres://dev:dev@localhost:5432/product
          PHASE1_AGENT_ROOT: /tmp/invisible-string-p1-agents
        run: bun test tests/integration/phase1-acceptance.test.ts

      - name: Compose down
        if: always()
        run: docker compose down -v

  e2e:
    # Phase-2 acceptance: a real browser drives the built SPA against the FULL
    # compose stack (the e2e global-setup brings compose up itself under its
    # own project name p2e2e) through builder → publish (real eve build) → chat
    # → HITL round-trip. Slow on a cold npm cache — generous timeout.
    name: Phase-2 E2E (Playwright)
    runs-on:
      - nscloud-ubuntu-24.04-amd64-8x16-with-cache
      - nscloud-cache-tag-eve-npm
      - nscloud-cache-size-20gb
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - uses: jdx/mise-action@v2
        with:
          install_args: node@24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Mount Namespace cache volume (eve npm installs + Playwright browsers)
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: playwright
          path: ~/.npm

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run Phase-2 E2E
        working-directory: e2e
        run: bunx playwright test --project=acceptance

      - name: Upload Playwright traces + report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            e2e/.artifacts/
            e2e/playwright-report/
            e2e/.runtime/*.log
          retention-days: 7

  prod-compose:
    # Lints the prod compose files, then builds the REAL images from the
    # working tree and drives a publish through the containerized stack
    # (tests/integration/prod-compose-smoke.test.ts). The smoke is the drift
    # guard between host-lane code and the shipped images — host lanes run the
    # control plane under Bun+mise, so image-only breakage (e.g. build steps
    # spawning a binary the image doesn't carry) surfaces ONLY here.
    runs-on: nscloud-ubuntu-24.04-amd64-8x16
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compose config lint (bundled · external-data · build)
        run: |
          cat > /tmp/prod-lint.env <<'EOF'
          APP_DOMAIN=lint.example.com
          IMAGE_TAG=lint
          POSTGRES_PASSWORD=lint
          GARAGE_RPC_SECRET=lint
          S3_ACCESS_KEY_ID=GKdeadbeefdeadbeefdeadbeefdeadbeef
          S3_SECRET_ACCESS_KEY=lint
          ENCRYPTION_MASTER_KEY=lint
          PLATFORM_JWT_SECRET=lint
          BETTER_AUTH_SECRET=lint
          WORKER_SHARED_SECRET=lint
          WORKER_ID=00000000-0000-0000-0000-000000000000
          DATABASE_URL=postgres://lint:lint@db.example.com:5432/product
          WORLD_DATABASE_URL=postgres://lint:lint@db.example.com:5432/world
          S3_ENDPOINT=https://s3.example.com
          EOF
          docker compose --env-file /tmp/prod-lint.env -f docker-compose.prod.yml config -q
          docker compose --env-file /tmp/prod-lint.env -f docker-compose.prod.external-data.yml config -q
          docker compose --env-file /tmp/prod-lint.env -f docker-compose.prod.yml -f docker-compose.prod.build.yml config -q
      - name: External-data variant must not drift from the base compose
        run: ./scripts/check-prod-compose-drift.sh

      # Builds the three prod images (validation only, never pushed) via the
      # compose build override, boots the stack, and publishes a workflow
      # through the gateway — `eve build` runs INSIDE the control-plane image.
      - name: Prod-compose publish smoke (in-container eve build)
        env:
          PROD_SMOKE: "1"
        run: bun test tests/integration/prod-compose-smoke.test.ts

  phase3-acceptance:
    # Phase-3 worker pool: real control plane + TWO real workers + stub MCP +
    # stub Slack + mock-model, proving worker spread, every trigger type, Slack
    # thread continuity, HITL, dead-worker failover, and graceful drain. Four
    # distinct trigger workflows → four eve builds, so it is the slowest lane —
    # a separate job with the longest timeout.
    name: Phase-3 acceptance (multi-worker, failover, slack)
    runs-on:
      - nscloud-ubuntu-24.04-amd64-8x16-with-cache
      - nscloud-cache-tag-eve-npm
      - nscloud-cache-size-20gb
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - uses: jdx/mise-action@v2
        with:
          install_args: node@24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Mount Namespace cache volume (eve npm installs)
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          path: ~/.npm

      - name: Compose up (postgres, garage)
        run: docker compose up -d --wait postgres garage

      - name: Phase-3 acceptance
        env:
          TEST_DATABASE_URL: postgres://dev:dev@localhost:5432/product
          PHASE3_AGENT_ROOT: /tmp/invisible-string-p3-agents
        run: bun test tests/integration/phase3-acceptance.test.ts

      - name: Compose down
        if: always()
        run: docker compose down -v
